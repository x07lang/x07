name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always
  X07_PYTHON: python

jobs:
  verify_tag:
    name: verify-tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches repo version
        shell: bash
        run: |
          bash scripts/release/verify-tag.sh --repo-kind x07 --tag "${GITHUB_REF_NAME}"

  test:
    name: test
    needs: verify_tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        shell: bash
        run: ./scripts/ci/install_python_deps.sh
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            xz-utils
      - name: Run release-readiness CI
        shell: bash
        run: |
          ./scripts/ci/check_release_ready.sh

  build_matrix:
    name: build-${{ matrix.target }}
    needs:
      - verify_tag
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    env:
      X07_CARGO: cargo
      X07_CARGO_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            xz-utils
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install openssl@3 pkg-config
      - name: Build release binaries
        shell: bash
        run: |
          cargo build --locked --release --target "${{ matrix.target }}" \
            -p x07 \
            -p x07c \
            -p x07-host-runner \
            -p x07-os-runner \
            -p x07-vm-launcher \
            -p x07-vm-reaper \
            -p x07import-cli \
            -p x07up
      - name: Build x07-vz-helper (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./scripts/build_vz_helper.sh "./target/${{ matrix.target }}/release/x07-vz-helper"
      - name: Build and stage native backends
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./scripts/build_ext_regex.sh
          ./scripts/build_ext_fs.sh
          ./scripts/build_ext_stdio.sh
          ./scripts/build_ext_rand.sh
          ./scripts/build_ext_jsonschema.sh
          ./scripts/build_ext_math.sh
          ./scripts/build_ext_stream_xf.sh
          ./scripts/build_ext_time.sh
          ./scripts/build_ext_db_sqlite.sh
          ./scripts/build_ext_db_pg.sh
          ./scripts/build_ext_db_mysql.sh
          ./scripts/build_ext_db_redis.sh
      - name: Build release archives
        id: pack
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TOOLCHAIN_PATH="$(bash scripts/release/build-core-archive.sh \
            --component x07 \
            --version "${VERSION}" \
            --target "${{ matrix.target }}" \
            --out-dir dist/release)"
          X07UP_PATH="$(bash scripts/release/build-x07up-archive.sh \
            --version "${VERSION}" \
            --target "${{ matrix.target }}" \
            --out-dir dist/release)"
          echo "toolchain_path=${TOOLCHAIN_PATH}" >> "$GITHUB_OUTPUT"
          echo "x07up_path=${X07UP_PATH}" >> "$GITHUB_OUTPUT"
      - name: Attest built archives
        continue-on-error: true
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ${{ steps.pack.outputs.toolchain_path }}
            ${{ steps.pack.outputs.x07up_path }}
      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: archives-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 7

  guest_runner_image:
    name: guest-runner-image
    needs:
      - build_matrix
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push guest runner image
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f ci/x07-guest-runner/Dockerfile \
            -t "ghcr.io/x07lang/x07-guest-runner:${tag}" \
            --push \
            .

  finalize_release:
    name: finalize-release
    needs:
      - build_matrix
      - guest_runner_image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "checksums=dist/release/x07-${VERSION}-checksums.txt" >> "$GITHUB_OUTPUT"
          echo "component_manifest=dist/release/x07-${VERSION}-release.json" >> "$GITHUB_OUTPUT"
          echo "bundle_manifest=dist/release/x07-${VERSION}-bundle.json" >> "$GITHUB_OUTPUT"
          echo "attestations_jsonl=dist/release/x07-${VERSION}-attestations.jsonl" >> "$GITHUB_OUTPUT"
      - name: Build release manifest
        shell: bash
        run: |
          python3 scripts/build_release_manifest.py --out dist/release-manifest.json
      - name: Build skills pack
        shell: bash
        run: |
          python3 scripts/build_skills_pack.py --tag "${GITHUB_REF_NAME}" --out "dist/x07-skills-${GITHUB_REF_NAME}.tar.gz"
      - name: Build docs bundle
        shell: bash
        run: |
          python3 scripts/build_docs_bundle.py --tag "${GITHUB_REF_NAME}"
      - name: Export attestations bundle
        shell: bash
        run: |
          bash scripts/release/export-attestations-jsonl.sh \
            --in-dir dist/release \
            --out "${{ steps.meta.outputs.attestations_jsonl }}"
      - name: Generate checksums
        shell: bash
        run: |
          python3 scripts/release/gen-checksums.py \
            --in-dir dist/release \
            --out "${{ steps.meta.outputs.checksums }}"
      - name: Generate component release manifest
        shell: bash
        run: |
          python3 scripts/release/gen-component-release.py \
            --schema x07.component.release@0.1.0 \
            --component x07_core \
            --version "${{ steps.meta.outputs.version }}" \
            --tag "${GITHUB_REF_NAME}" \
            --repo "https://github.com/${GITHUB_REPOSITORY}" \
            --assets-dir dist/release \
            --compat-file "releases/compat/${{ steps.meta.outputs.version }}.json" \
            --out "${{ steps.meta.outputs.component_manifest }}"
      - name: Validate component release manifest
        shell: bash
        run: |
          python3 scripts/release/validate-json.py \
            --schema x07.component.release@0.1.0 \
            --in "${{ steps.meta.outputs.component_manifest }}" \
            --require component \
            --require version \
            --require assets \
            --require compatibility
      - name: Generate release bundle manifest
        shell: bash
        run: |
          python3 scripts/release/gen-bundle.py \
            --schema x07.release.bundle@0.1.0 \
            --channel stable \
            --input "releases/bundles/${{ steps.meta.outputs.version }}.input.json" \
            --core-manifest "${{ steps.meta.outputs.component_manifest }}" \
            --out "${{ steps.meta.outputs.bundle_manifest }}"
      - name: Validate release bundle manifest
        shell: bash
        run: |
          python3 scripts/release/validate-json.py \
            --schema x07.release.bundle@0.1.0 \
            --in "${{ steps.meta.outputs.bundle_manifest }}" \
            --require channel \
            --require x07_core \
            --require x07_wasm \
            --require x07_web_ui_host \
            --require x07_device_host \
            --require packages
      - name: Attest manifest assets
        continue-on-error: true
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            ${{ steps.meta.outputs.attestations_jsonl }}
            ${{ steps.meta.outputs.checksums }}
            ${{ steps.meta.outputs.component_manifest }}
            ${{ steps.meta.outputs.bundle_manifest }}
      - name: Build channels manifest (install)
        shell: bash
        run: |
          python3 scripts/build_channels_json.py \
            --tag "${GITHUB_REF_NAME}" \
            --dist dist/release \
            --bundle "${{ steps.meta.outputs.bundle_manifest }}" \
            --out dist/channels.json \
            --channel-out-dir dist/channels
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/release/* \
            dist/release-manifest.json \
            dist/channels.json \
            dist/channels/*.json \
            dist/x07-docs-${GITHUB_REF_NAME}.tar.gz \
            dist/x07-skills-${GITHUB_REF_NAME}.tar.gz \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false
