name: CI (VM sandbox)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: x07-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runner_inventory:
    name: vm / runner inventory
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    outputs:
      has_linux_firecracker_runner: ${{ steps.inventory.outputs.has_linux_firecracker_runner }}
      has_macos_vz_runner: ${{ steps.inventory.outputs.has_macos_vz_runner }}
    steps:
      - name: Detect self-hosted VM runners
        id: inventory
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          response="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runners")"
          linux_count="$(jq '[.runners[] | select(.status == "online") | select(any(.labels[]?; .name == "x07-vm-linux-firecracker"))] | length' <<<"$response")"
          macos_count="$(jq '[.runners[] | select(.status == "online") | select(any(.labels[]?; .name == "x07-vm-macos"))] | length' <<<"$response")"

          if (( linux_count > 0 )); then
            echo "has_linux_firecracker_runner=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_linux_firecracker_runner=false" >> "$GITHUB_OUTPUT"
          fi

          if (( macos_count > 0 )); then
            echo "has_macos_vz_runner=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_macos_vz_runner=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "Linux firecracker runners: ${linux_count}"
            echo "macOS VZ runners: ${macos_count}"
          } >> "$GITHUB_STEP_SUMMARY"

  macos-vm:
    name: vm / macos (vz)
    needs: runner_inventory
    runs-on: [self-hosted, x07-vm-macos]
    if: |
      needs.runner_inventory.outputs.has_macos_vz_runner == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 90
    env:
      X07_VM_BACKEND: vz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Build guest runner image
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build_guest_runner_image.sh --image x07-guest-runner --tag vm-ci
          echo "X07_VM_GUEST_IMAGE=x07-guest-runner:vm-ci" >> "$GITHUB_ENV"

      - name: Build VZ guest bundle
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d 2>/dev/null || mktemp -d -t x07_vz_bundle)"
          bundle_dir="${tmp}/guest.bundle"
          ./scripts/build_vz_guest_bundle.sh --image "x07-guest-runner:vm-ci" --out "$bundle_dir"
          echo "X07_VM_VZ_GUEST_BUNDLE=$bundle_dir" >> "$GITHUB_ENV"

      - name: Build VZ helper
        shell: bash
        run: ./scripts/build_vz_helper.sh ./target/debug/x07-vz-helper

      - name: VM sandbox smoke
        shell: bash
        run: ./scripts/ci/check_vm_sandbox_smoke.sh

      - name: Network trust VZ smoke
        shell: bash
        env:
          X07_SKIP_CERTIFY: "1"
        run: |
          ./scripts/ci/check_trusted_network_service_example.sh
          ./scripts/ci/check_certified_network_capsule_example.sh

  linux-vm:
    name: vm / linux (firecracker)
    needs: runner_inventory
    runs-on: [self-hosted, x07-vm-linux-firecracker]
    if: |
      needs.runner_inventory.outputs.has_linux_firecracker_runner == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 90
    env:
      X07_VM_BACKEND: firecracker-ctr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Build and import guest runner image
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/build_guest_runner_image.sh --image x07-guest-runner --tag vm-ci

          tmp="$(mktemp -d 2>/dev/null || mktemp -d -t x07_guest_image)"
          image_tar="${tmp}/guest-runner.tar"
          docker save "x07-guest-runner:vm-ci" -o "$image_tar"

          sock="${X07_VM_FIRECRACKER_CONTAINERD_SOCK:-/run/firecracker-containerd/containerd.sock}"
          ns="${X07_VM_CONTAINERD_NAMESPACE:-x07}"
          firecracker-ctr --address "$sock" --namespace "$ns" images import "$image_tar"

          echo "X07_VM_GUEST_IMAGE=x07-guest-runner:vm-ci" >> "$GITHUB_ENV"

      - name: VM sandbox smoke
        shell: bash
        run: ./scripts/ci/check_vm_sandbox_smoke.sh

  trust-vm-examples:
    name: vm / trust examples / ${{ matrix.check }}
    needs: runner_inventory
    runs-on: [self-hosted, x07-vm-linux-firecracker]
    if: |
      needs.runner_inventory.outputs.has_linux_firecracker_runner == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        check:
          - check_trusted_sandbox_program_example.sh
          - check_trusted_network_service_example.sh
          - check_certified_capsule_example.sh
          - check_certified_network_capsule_example.sh
    env:
      X07_VM_BACKEND: firecracker-ctr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            clang \
            build-essential \
            curl \
            pkg-config \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            unzip

      - name: Install formal verification tools
        shell: bash
        run: ./scripts/ci/install_formal_verification_tools_linux.sh

      - name: Build and import guest runner image
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/build_guest_runner_image.sh --image x07-guest-runner --tag vm-ci

          tmp="$(mktemp -d 2>/dev/null || mktemp -d -t x07_guest_image)"
          image_tar="${tmp}/guest-runner.tar"
          docker save "x07-guest-runner:vm-ci" -o "$image_tar"

          sock="${X07_VM_FIRECRACKER_CONTAINERD_SOCK:-/run/firecracker-containerd/containerd.sock}"
          ns="${X07_VM_CONTAINERD_NAMESPACE:-x07}"
          firecracker-ctr --address "$sock" --namespace "$ns" images import "$image_tar"

          echo "X07_VM_GUEST_IMAGE=x07-guest-runner:vm-ci" >> "$GITHUB_ENV"

      - name: Run trust example check
        shell: bash
        run: ./scripts/ci/${{ matrix.check }}
