name: CI (labs)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  labs-hosted-linux:
    name: ci / labs / hosted linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            curl \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            unzip

      - name: Install formal verification tools
        shell: bash
        run: ./scripts/ci/install_formal_verification_tools_linux.sh

      - name: Labs suites (reference solutions)
        shell: bash
        run: ./labs/scripts/ci/check_suites_h1h2.sh

      - name: Labs perf baseline
        shell: bash
        env:
          X07_FORMAL_PERF_REPORT_OUT: artifacts/ci/formal-verification-perf.hosted-linux.json
        run: ./labs/scripts/ci/check_perf_baseline.sh

  labs-selfhosted-kvm:
    name: ci / labs / self-hosted kvm
    runs-on: [self-hosted, x07-vm-linux-firecracker]
    timeout-minutes: 90
    env:
      X07_FORMAL_PERF_REPORT_OUT: artifacts/ci/formal-verification-perf.selfhosted-kvm.json
      X07_SKIP_SUITE_PERF: "1"
      X07_VM_BACKEND: firecracker-ctr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            clang \
            build-essential \
            curl \
            pkg-config \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            unzip

      - name: Install formal verification tools
        shell: bash
        run: ./scripts/ci/install_formal_verification_tools_linux.sh

      - name: Build and import guest runner image
        shell: bash
        run: |
          set -euo pipefail

          ./scripts/build_guest_runner_image.sh --image x07-guest-runner --tag perf-ci

          tmp="$(mktemp -d 2>/dev/null || mktemp -d -t x07_guest_image)"
          image_tar="${tmp}/guest-runner.tar"
          docker save "x07-guest-runner:perf-ci" -o "$image_tar"

          sock="${X07_VM_FIRECRACKER_CONTAINERD_SOCK:-/run/firecracker-containerd/containerd.sock}"
          ns="${X07_VM_CONTAINERD_NAMESPACE:-x07}"
          firecracker-ctr --address "$sock" --namespace "$ns" images import "$image_tar"

          echo "X07_VM_GUEST_IMAGE=x07-guest-runner:perf-ci" >> "$GITHUB_ENV"

      - name: Formal verification perf baseline
        shell: bash
        run: ./labs/scripts/ci/check_perf_baseline.sh

  labs-macos-vz:
    name: ci / labs / macos vz
    runs-on: [self-hosted, x07-vm-macos]
    continue-on-error: true
    timeout-minutes: 90
    env:
      X07_FORMAL_PERF_REPORT_OUT: artifacts/ci/formal-verification-perf.macos-vz.json
      X07_SKIP_SUITE_PERF: "1"
      X07_VM_BACKEND: vz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check formal verification tools
        shell: bash
        run: |
          set -euo pipefail
          command -v cbmc
          command -v z3

      - name: Build guest runner image
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build_guest_runner_image.sh --image x07-guest-runner --tag perf-ci
          echo "X07_VM_GUEST_IMAGE=x07-guest-runner:perf-ci" >> "$GITHUB_ENV"

      - name: Build VZ guest bundle
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d 2>/dev/null || mktemp -d -t x07_vz_bundle)"
          bundle_dir="${tmp}/guest.bundle"
          ./scripts/build_vz_guest_bundle.sh --image "x07-guest-runner:perf-ci" --out "$bundle_dir"
          echo "X07_VM_VZ_GUEST_BUNDLE=$bundle_dir" >> "$GITHUB_ENV"

      - name: Build VZ helper
        shell: bash
        run: ./scripts/build_vz_helper.sh ./target/debug/x07-vz-helper

      - name: Formal verification perf visibility
        shell: bash
        run: ./labs/scripts/ci/check_perf_baseline.sh
