name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: x07-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rustfmt:
    name: ci / rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --check

  test:
    name: ci / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            curl \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            unzip
      - name: Install formal verification tools
        shell: bash
        run: ./scripts/ci/install_formal_verification_tools_linux.sh
      - name: Stage native math backend
        shell: bash
        run: ./scripts/ci/ensure_math_backend.sh
      - name: Stage native stream-xf backend
        shell: bash
        run: ./scripts/ci/ensure_stream_xf_backend.sh
      - name: Build runner binaries (needed by x07 run tests)
        run: cargo build -p x07-host-runner -p x07-os-runner
      - name: cargo test
        run: cargo test

  clippy:
    name: ci / clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

  fuzz-smoke:
    name: ci / fuzz-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            labs/fuzz -> target
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked
      - name: Fuzz smoke
        shell: bash
        run: ./scripts/ci/check_fuzz_smoke.sh
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: labs/fuzz/artifacts
          if-no-files-found: ignore

  contracts:
    name: ci / contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: LLM/tool contracts
        run: python3 scripts/check_contracts.py
      - name: Published spec sync (check)
        run: python3 scripts/sync_published_spec.py --check
      - name: Versions artifact (check)
        run: python3 scripts/gen_versions_json.py --check
      - name: Docs/skills schema refs (check)
        run: python3 scripts/ci/check_doc_schema_refs.py
      - name: Docs example lockfiles schema (check)
        run: python3 scripts/ci/check_doc_lockfiles_schema.py
      - name: Docs examples x07AST schema_version (check)
        run: python3 scripts/upgrade_docs_example_x07ast_schema.py --check
      - name: Docs examples x07AST formatting (check)
        run: ./scripts/ci/check_doc_examples_x07ast_fmt.sh

  e2e-smoke:
    name: ci / e2e-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: x07 test smoke
        shell: bash
        run: ./scripts/ci/check_x07test_smoke.sh

  compat-corpus:
    name: ci / compat-corpus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            curl \
            pkg-config \
            openssl \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            unzip
      - name: Compat corpus
        shell: bash
        run: ./scripts/ci/check_compat_corpus.sh

  verified-core-pure:
    name: ci / verified-core-pure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            curl \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev \
            unzip
      - name: Install formal verification tools
        shell: bash
        run: ./scripts/ci/install_formal_verification_tools_linux.sh
      - name: verified_core_pure_v1 certify
        shell: bash
        env:
          X07_REQUIRE_SOLVERS: "1"
        run: ./scripts/ci/check_verified_core_pure_example.sh
      - name: verified_core_fixture_v1 release guard
        shell: bash
        env:
          X07_REQUIRE_SOLVERS: "1"
        run: ./scripts/ci/check_verified_core_fixture.sh

  network-trust-static:
    name: ci / network-trust-static / ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - check_trusted_network_service_static.sh
          - check_certified_network_capsule_static.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: Network trust static check
        shell: bash
        run: ./scripts/ci/${{ matrix.check }}

  determinism:
    name: ci / determinism
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: Canary gate
        shell: bash
        run: ./scripts/ci/check_canaries.sh

  pkg-contracts:
    name: ci / pkg-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: Package manager contracts (pack + lock)
        run: python3 scripts/check_pkg_contracts.py --check

  licenses:
    name: ci / licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: License files present
        shell: bash
        run: ./scripts/ci/check_licenses.sh

  release-manifest:
    name: ci / release-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build release manifest (check)
        run: python3 scripts/build_release_manifest.py --check
      - name: Release script goldens
        run: python3 scripts/ci/check_release_goldens.py

  installer-smoke:
    name: ci / installer-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            liblzma-dev \
            zlib1g-dev \
            libsqlite3-dev
      - name: Installer smoke (local channels)
        shell: bash
        run: ./scripts/ci/check_installer_smoke.sh

  dco:
    name: ci / dco
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Rust (rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
      - name: DCO sign-off
        shell: bash
        run: ./scripts/ci/check_dco.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
